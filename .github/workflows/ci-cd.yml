name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # required for OIDC → AWS

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: tank-db

jobs:
  # ─── 1. TEST ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install & test
        working-directory: backend
        run: npm ci && npm test

      - name: Frontend — install & build
        working-directory: frontend
        run: npm ci && npm run build

  # ─── 2. BUILD & PUSH TO ECR (main only) ─────────────────────────
  push:
    name: Push image (${{ matrix.service.name }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: backend,  context: ./backend }
          - { name: frontend, context: ./frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tank-db-${{ matrix.service.name }}:latest
            ${{ steps.ecr-login.outputs.registry }}/tank-db-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ─── 3. DEPLOY TO EKS (main only) ───────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Sync k8s secret
        run: |
          kubectl create secret generic backend-secrets \
            --namespace tank-db \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=CLIENT_ORIGIN="https://harelvalfish.dev" \
            --from-literal=ADMIN_KEY="${{ secrets.ADMIN_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: kubectl apply -f k8s/

      - name: Rolling update — backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ steps.ecr-login.outputs.registry }}/tank-db-backend:${{ github.sha }} \
            -n tank-db
          kubectl rollout status deployment/backend -n tank-db --timeout=120s

      - name: Rolling update — frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ steps.ecr-login.outputs.registry }}/tank-db-frontend:${{ github.sha }} \
            -n tank-db
          kubectl rollout status deployment/frontend -n tank-db --timeout=120s
